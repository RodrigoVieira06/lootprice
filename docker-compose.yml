version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lootprice_db
    restart: always
    environment:
      POSTGRES_USER: lootprice_user
      POSTGRES_PASSWORD: lootprice_password
      POSTGRES_DB: lootprice_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
