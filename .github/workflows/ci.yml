# CI — Lint & Tests
# Nota: A revisão automática de código com nota de qualidade (grade) é realizada
# em paralelo pelo workflow '.github/workflows/ai-review.yml' que comenta no PR.
name: CI — Lint & Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Garante que apenas 1 workflow roda por vez por branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend: Ruff (lint + format) + Pytest
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: lootprice_test
          POSTGRES_PASSWORD: lootprice_test
          POSTGRES_DB: lootprice_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ruff — Lint
        working-directory: backend
        run: ruff check .

      - name: Ruff — Format check
        working-directory: backend
        run: ruff format --check .

      - name: Pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://lootprice_test:lootprice_test@localhost:5432/lootprice_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
        run: pytest tests/ -v --tb=short

